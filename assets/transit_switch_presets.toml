# Transit Switch Point presets used by the transit preset wizard.
#
# IDs and base names follow the Transportation category names in
# new_properties.xml where possible. Presets are explicit complete switch sets:
# rowsets are only an authoring aid, and each [[preset]] lists the rowsets that
# compile into its final 0xE90E25A1 value.
#
# Editor guide
# ============
#
# [[option]]
#   Declares one optional-function checkbox in the wizard, in display order.
#   id: stable machine ID used by base/preset `options` lists.
#   label: checkbox text shown in the UI.
#
# [[base]]
#   Declares one selectable "Transportation" value in the wizard.
#   Declaration order is the dropdown order.
#
#   id:
#     Stable machine ID. Prefer names from new_properties.xml categories.
#
#   label:
#     Display name shown in the wizard dropdown.
#
#   placements:
#     Which lot-orientation choices are enabled for this base.
#     Allowed values:
#       "proximity" - network is beside the lot; rows usually use "all" edges
#       "on_top_we" - on-top network with west/east through traffic
#       "on_top_ns" - on-top network with north/south through traffic
#
#   options:
#     Which optional checkbox functions are enabled for this base in the UI.
#     This is only the availability rule. It does NOT automatically add rows.
#     Every selected option combination still needs its own explicit [[preset]].
#
#   note:
#     Optional help/disclaimer text shown in the wizard whenever this base is
#     selected, above any [[preset]] note.
#
# [[inference]]
#   Auto-detect rules mapping an exemplar's OccupantGroups to a default base.
#   Checked in declaration order (most specific first); a rule matches when
#   every `requires` list shares at least one ID with the exemplar's groups.
#
#     Allowed values:
#       "garage"                         - Garage / car parking function
#       "bus_stop"                       - Bus Stop function
#       "subway_station"                 - Subway Station function
#       "freight_train_pass_through"     - Extra freight train pass-through
#       "passenger_train_pass_through"   - Extra passenger train pass-through
#
# [[rowset]]
#   A reusable named group of readable Transit Switch rows. Rowsets are fragments
#   for editing only; the loader compiles them into full byte strings per preset.
#
#   rows:
#     Each row is [direction, edges, from_travel, to_travel].
#
#     direction values:
#       "outside_in" - 0x81
#       "inside_out" - 0x82
#
#     edge values:
#       "all" - all lot edges, 0xF0
#       "we"  - west/east only, 0xA0
#       "ns"  - north/south only, 0x50
#       "north", "east", "south", "west" are also accepted for one-edge rows.
#
#     travel values:
#       "walk", "car", "bus", "train", "passenger_train",
#       "freight_truck", "freight_train", "subway", "el_train",
#       "elevated_rail", "monorail"
#
# [[preset]]
#   One explicit complete wizard result for base + placement + selected options.
#   The wizard only applies presets declared here. It does not build missing
#   combinations automatically from the option checkboxes.
#
#   id:
#     Human-readable stable ID. Convention:
#       <base>.<placement>[.<option>...]
#     Keep option segments sorted the same way as the options list when possible.
#
#   base:
#     Must match a [[base]].id.
#
#   placement:
#     Must be allowed by that base's placements list.
#
#   options:
#     The exact selected checkbox set for this preset. Empty means no optional
#     functions selected. Values must be allowed by that base's options list.
#
#   category_id:
#     new_properties.xml Transportation category used for non-switch properties
#     such as capacity/cost formulas, query exemplar, and OccupantGroups.
#
#   rowsets:
#     Explicit ordered list of rowsets that make up this complete switch preset.
#     This is preferred over raw bytes because it is reviewable.
#
#   rows:
#     Optional preset-local rows in the same readable format as [[rowset]].rows.
#
#   switches:
#     Optional fallback: a complete 0xE90E25A1 byte string such as
#     "0x81,0xF0,0x00,0x00". Use for expert cases that are clearer as raw data than rowsets.
#
#   note:
#     Optional help/disclaimer text shown when this exact combination is
#     selected (e.g. travel types covered, manual TSEC edits still required).

