# Transit Switch Point presets used by the transit preset wizard.
#
# IDs and base names follow the Transportation category names in
# new_properties.xml where possible. Presets are explicit complete switch sets:
# rowsets are only an authoring aid, and each [[preset]] lists the rowsets that
# compile into its final 0xE90E25A1 value.
#
# Editor guide
# ============
#
# [[option]]
#   Declares one optional-function checkbox in the wizard, in display order.
#   id: stable machine ID used by base/preset `options` lists.
#   label: checkbox text shown in the UI.
#
# [[base]]
#   Declares one selectable "Transportation" value in the wizard.
#   Declaration order is the dropdown order.
#
#   id:
#     Stable machine ID. Prefer names from new_properties.xml categories.
#
#   label:
#     Display name shown in the wizard dropdown.
#
#   placements:
#     Which lot-orientation choices are enabled for this base.
#     Allowed values:
#       "proximity" - network is beside the lot; rows usually use "all" edges
#       "on_top_we" - on-top network with west/east through traffic
#       "on_top_ns" - on-top network with north/south through traffic
#
#   options:
#     Which optional checkbox functions are enabled for this base in the UI.
#     This is only the availability rule. It does NOT automatically add rows.
#     Every selected option combination still needs its own explicit [[preset]].
#
#   note:
#     Optional help/disclaimer text shown in the wizard whenever this base is
#     selected, above any [[preset]] note.
#
# [[inference]]
#   Auto-detect rules mapping an exemplar's OccupantGroups to a default base.
#   Checked in declaration order (most specific first); a rule matches when
#   every `requires` list shares at least one ID with the exemplar's groups.
#
#     Allowed values:
#       "garage"                         - Garage / car parking function
#       "bus_stop"                       - Bus Stop function
#       "subway_station"                 - Subway Station function
#       "freight_train_pass_through"     - Extra freight train pass-through
#       "passenger_train_pass_through"   - Extra passenger train pass-through
#
# [[rowset]]
#   A reusable named group of readable Transit Switch rows. Rowsets are fragments
#   for editing only; the loader compiles them into full byte strings per preset.
#
#   rows:
#     Each row is [direction, edges, from_travel, to_travel].
#
#     direction values:
#       "outside_in" - 0x81
#       "inside_out" - 0x82
#
#     edge values:
#       "all" - all lot edges, 0xF0
#       "we"  - west/east only, 0xA0
#       "ns"  - north/south only, 0x50
#       "north", "east", "south", "west" are also accepted for one-edge rows.
#
#     travel values:
#       "walk", "car", "bus", "train", "passenger_train",
#       "freight_truck", "freight_train", "subway", "el_train",
#       "elevated_rail", "monorail"
#
# [[preset]]
#   One explicit complete wizard result for base + placement + selected options.
#   The wizard only applies presets declared here. It does not build missing
#   combinations automatically from the option checkboxes.
#
#   id:
#     Human-readable stable ID. Convention:
#       <base>.<placement>[.<option>...]
#     Keep option segments sorted the same way as the options list when possible.
#
#   base:
#     Must match a [[base]].id.
#
#   placement:
#     Must be allowed by that base's placements list.
#
#   options:
#     The exact selected checkbox set for this preset. Empty means no optional
#     functions selected. Values must be allowed by that base's options list.
#
#   category_id:
#     new_properties.xml Transportation category used for non-switch properties
#     such as capacity/cost formulas, query exemplar, and OccupantGroups.
#
#   rowsets:
#     Explicit ordered list of rowsets that make up this complete switch preset.
#     This is preferred over raw bytes because it is reviewable.
#
#   rows:
#     Optional preset-local rows in the same readable format as [[rowset]].rows.
#
#   switches:
#     Optional fallback: a complete 0xE90E25A1 byte string such as
#     "0x81,0xF0,0x00,0x00". Use for expert cases that are clearer as raw data than rowsets.
#
#   blank_props:
#     Optional list of properties that should not be seeded from the category.
#     If left blank in the wizard they are not written. Editable cost/capacity
#     fields still write a property when the user manually enters a value.
#     Use numeric property IDs, e.g. ["0xE90E25A2", "0xE90E25A3"].
#
#   note:
#     Optional help/disclaimer text shown when this exact combination is
#     selected (e.g. travel types covered, manual TSEC edits still required).

[[option]]
id = "garage"
label = "Parking (Garage)"

[[option]]
id = "bus_stop"
label = "Bus Stop"

[[option]]
id = "subway_station"
label = "Subway Station"

[[option]]
id = "freight_train_pass_through"
label = "Freight Train Pass-Through"

[[option]]
id = "passenger_train_pass_through"
label = "Passenger Train Pass-Through"

[[option]]
id = "railway_pass_through"
label = "Network Enabling Railway Pass-Through"

[[option]]
id = "roadway_pass_through"
label = "Network Enabling Roadway Pass-Through"

[[option]]
id = "eltrain_pass_through"
label = "Network Enabling Light Rail Pass-Through"

[[option]]
id = "monorail_pass_through"
label = "Network Enabling Monorail/HSR Pass-Through"

[[option]]
id = "hwr_pass_through"
label = "Network Enabling Hybrid Railway (HRW) Pass-Through"

[[base]]
id = "bus_stop"
label = "Bus Stop"
placements = ["proximity", "on_top_we", "on_top_ns"]
options = ["garage"]
note = "Choose a proximity placement if the station sits beside the network and the network does not pass through the lot. Choose one of the on-top placements if the station sits on the network (for example, the RTMT stations), with the direction set to match how the network passes through the lot. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "subway_station"
label = "Subway Station"
placements = ["proximity", "on_top_we", "on_top_ns"]
options = ["garage", "bus_stop"]
note = "Choose a proximity placement if the station sits beside the network and the network does not pass through the lot. Choose one of the on-top placements if the station sits on the network (for example, the RTMT stations), with the direction set to match how the network passes through the lot. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "elevated_rail_station"
label = "Light Rail (El-Rail / GLR / Tram) Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station"]
note = "These switches serve both Elevated Light Rail (El-Rail) and Ground Light Rail (GLR, also known as Tram) services. If you are modding a GLR station, remember to apply the GLR network paths on the TE editor side of the Lot Editor. By default these are on-top stations (the network passes through the lot). If your station is a proximity, El-Rail-based setup, use the Multipurpose Proximity Station or Multipurpose Proximity Hub presets instead. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "passenger_train_station"
label = "Passenger Train Station"
placements = ["proximity", "on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station", "freight_train_pass_through"]
note = "Choose a proximity placement if the station sits beside the network and the network does not pass through the lot. Choose one of the on-top placements if the station sits on the network (the rail tracks run through the lot), with the direction set to match how the network passes through the lot. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "freight_train_station"
label = "Freight Train Station"
placements = ["proximity", "on_top_we", "on_top_ns"]
options = ["passenger_train_pass_through"]
note = "Choose a proximity placement if the station sits beside the network and the network does not pass through the lot. Choose one of the on-top placements if the station sits on the network (the rail tracks run through the lot), with the direction set to match how the network passes through the lot. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "passenger_freight_station"
label = "Passenger + Freight Train Station"
placements = ["proximity", "on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station"]
note = "These are special stations that serve passenger rail and also handle freight. Choose a proximity placement if the station sits beside the network and the network does not pass through the lot. Choose one of the on-top placements if the station sits on the network (the rail tracks run through the lot), with the direction set to match how the network passes through the lot. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "monorail_station"
label = "Monorail (and High Speed Rail / HSR) Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station"]
note = "These switches serve both Monorail and BTM/Shinkansen/High Speed Rail (HSR) services. By default these are on-top stations (the network passes through the lot). If your station is a proximity, Monorail-based setup, use the Multipurpose Proximity Station or Multipurpose Proximity Hub presets instead. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "hrw_station"
label = "Hybrid Railway (HRW) Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "freight_train_pass_through"]
note = "A Hybrid Railway (HRW) station is generally Monorail-based and allows both Monorail and regular passenger rail to pass through, with passengers able to transfer between them on the same line. Subway and Bus services are included by default. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it." 

[[base]]
id = "hrw_station_passenger_rail"
label = "Hybrid Railway Passenger Rail Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "freight_train_pass_through"]
note = "This special type of HRW station allows both Monorail and regular passenger rail to pass through, but only lets passengers transfer to and from passenger rail services at the station. Monorail and high speed rail services do not stop here; only regular passenger rail services do. Subway and Bus services are included by default. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it." 

[[base]]
id = "u_rail_station"
label = "U-Rail Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station"]
note = "These setups are for Underground Rail (U-Rail), where the rail line runs beneath the road network. They are made specifically to support the U-Rail puzzle pieces following the RTMT v4 (and later) standards. The switches allow freight trains to pass through, but provide no cargo handling function. These presets cover only the rail station side, with additional Bus and Subway options. They do not cover plain Bus and Subway options over a U-Rail network without the passenger train station transition function; for those, look for options in RTMT v4 (and later). Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "el_rail_glr_dual_network_station"
label = "Light Rail Dual Network Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station"]
note = "These presets cover the following station types: Tram-in-Avenue (TIA), Tram-on-Road (TOR), Tram-in-Road (TIR), Tram-on-Street (TOS), Underground GLR (U-GLR or U-Tram; currently a very niche and limited network with only a few puzzle pieces, which run beneath roads and avenues), El-Rail-over-Road, El-Rail-over-Street, El-Rail-over-Avenue and El-Rail-over-RD4. They do not cover plain Bus and Subway options over the network without the El-Rail/GLR station transition function; for those, look for options in RTMT v4 (and later). Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "rail_elevated_rail_station"
label = "Rail + Light Rail Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "freight_train_pass_through"]
note = "These presets are for complex stations where multiple rail-based networks pass through a lot and let passengers transfer between them (here, Passenger Rail and Light Rail (El-Rail/GLR)). They are exclusively for on-top stations; Subway and Bus services are included by default. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "monorail_elevated_rail_station"
label = "Monorail + Light Rail Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage"]
note = "These presets are for complex stations where multiple rail-based networks pass through a lot and let passengers transfer between them (here, Monorail and Light Rail (El-Rail/GLR)). They are exclusively for on-top stations; Subway and Bus services are included by default. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "hrw_elevated_rail_station"
label = "Monorail-Rail (HRW) + Light Rail Station"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "freight_train_pass_through"]
note = "These presets are for complex stations where multiple rail-based networks pass through a lot and let passengers transfer between them (here, Monorail, Passenger Rail (or HRW) and Light Rail (El-Rail/GLR)). This preset can be used equally for HRW + Light Rail or Monorail + Passenger Rail + Light Rail stations (such as the HSRP Transit Hub in the NAM). They are exclusively for on-top stations; Subway and Bus services are included by default. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "multipurpose_proximity_station"
label = "Multipurpose Proximity Station"
placements = ["proximity"]
options = ["garage"]
note = "Subway and Bus services are included. The station supports Monorail, Passenger Rail, Hybrid Railway (HRW), El-Rail and BRT (Bus Rapid Transit, an RHW-based bus service) travel types on one side (usually the far side). It can also partly support dual-network GLR-based (TIR/TOR/TIS) travel types on the other side (usually the front side). Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "multipurpose_proximity_hub"
label = "Multipurpose Proximity Hub"
placements = ["proximity"]
options = ["garage"]
note = "Subway and Bus services are included. This is a specific setup for when networks (such as Monorail and regular Rail) cross each other at different levels at the station. The station supports Monorail, Passenger Rail, Hybrid Railway (HRW), El-Rail and BRT travel types on one side (usually the far side). It can also partly support dual-network GLR-based (TIR/TOR/TIS) travel types on the other side (usually the front side). Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "multipurpose_on_top_proximity_rail_station"
label = "Multipurpose On-Top Proximity Station - Rail"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "freight_train_pass_through"]
note = "Subway and Bus services are included. These are special stations with switches for mostly one major on-top travel type (here, Passenger Rail) plus proximity access on the side(s) for other travel types (such as BRT, Monorail/GHSR/HRW, El-Rail/GLR). These switches are experimental. The best current example of this type is the NAM version of Debussyman's Dresden Central HB. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "multipurpose_on_top_proximity_el_rail_station"
label = "Multipurpose On-Top Proximity Station - El-Rail"
placements = ["on_top_we", "on_top_ns"]
options = ["garage"]
note = "Subway and Bus services are included. These are special stations with switches for mostly one major on-top travel type (here, El-Rail) plus proximity access on the side(s) for other travel types (such as Passenger Rail, BRT, Monorail/HSR/BTM/HRW). These switches are experimental and cover a station type that has been discussed internally but not yet implemented. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "multipurpose_on_top_proximity_monorail_station"
label = "Multipurpose On-Top Proximity Station - Monorail"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "bus_stop", "subway_station"]
note = "Subway and Bus services are included. These are special stations with switches for mostly one major on-top travel type (here, Monorail/HSR/BTM) plus proximity access on the side(s) for other travel types (such as Passenger Rail, BRT, El-Rail/GLR). These switches are experimental and cover a station type that has been discussed internally but not yet implemented. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "multipurpose_on_top_proximity_hrw_station"
label = "Multipurpose On-Top Proximity Station - HRW"
placements = ["on_top_we", "on_top_ns"]
options = ["garage", "freight_train_pass_through"]
note = "Subway and Bus services are included. These are special stations with switches for mostly one major on-top travel type (here, Hybrid Railway (HRW)) plus proximity access on the side(s) for other travel types (such as Passenger Rail, BRT, El-Rail/GLR and Monorail/HSR/BTM). These switches are experimental and cover a station type that has been discussed internally but not yet implemented. Note: the Parking (Garage) option should only be enabled for lots whose building visually supports it."

[[base]]
id = "garage"
label = "Parking (Garage)"
placements = ["proximity", "on_top_we", "on_top_ns"]
options = []
note = "These presets are for car parks only — above-ground or underground parking garages. For a car park function attached to another type of transportation station (bus stops, train stations, etc.), use that station's presets and enable the Parking (Garage) option."

[[base]]
id = "toll_booth"
label = "Toll Booth"
placements = ["on_top_ns", "on_top_we"]
options = []

[[base]]
id = "network_enabling"
label = "Network Enabling"
placements = ["on_top_ns", "on_top_we"]
options = ["roadway_pass_through", "railway_pass_through", "eltrain_pass_through", "monorail_pass_through", "hwr_pass_through"]
note = "Network Enabling (NE) means the lot is given at least one directional pair of transit switches for the selected networks (roadway traffic: car, bus, freight trucks; railway networks; etc.) so that traffic can pass through the lot. It does not provide passenger transfer (station) functions. Although vehicles may visually stop at these lots, no passenger transfer takes place. These presets only provide the basic pass-through transit switches and combinations; you must still set the appropriate Transit Switch Entry Cost and Capacity manually, following the Transit Switch Entry Costs and Station Capacities guide. Complex Network Enabling switches must be set up and tailored manually. Network Enabling presets are available for: roadway-based networks (street, road, one-way road (OWR), avenue, highway) for pedestrians, cars, buses and freight trucks; the railway base network for passenger and freight trains; the El-Rail base network for Elevated Light Rail and Ground Light Rail (GLR); and the Monorail base network for Monorail, High Speed Rail (HSR) and Hybrid Railway (HRW)."

# OccupantGroup auto-detect rules, most specific first.

[[inference]]
base = "multipurpose_proximity_station"
requires = [
  [0x1303, 0xB5C00DF6, 0xB5C00DF9],
  [0x1307, 0xB5C00DF7],
  [0x1300, 0x1305, 0xB5C00DF3],
  [0xB5C00DFA],
  [0x1302, 0xB5C00DF5],
  [0x1301, 0x1926, 0xB5C00DF2, 0x130A, 0xB5C00DF1],
]

[[inference]]
base = "el_rail_glr_dual_network_station"
requires = [[0x1303, 0xB5C00DF6, 0xB5C00DF9], [0xB5C00DF9]]

[[inference]]
base = "hrw_elevated_rail_station"
requires = [[0xB5C00DFA], [0x1303, 0xB5C00DF6, 0xB5C00DF9]]

[[inference]]
base = "monorail_elevated_rail_station"
requires = [[0x1307, 0xB5C00DF7], [0x1303, 0xB5C00DF6, 0xB5C00DF9]]

[[inference]]
base = "rail_elevated_rail_station"
requires = [[0x1300, 0x1305, 0xB5C00DF3], [0x1303, 0xB5C00DF6, 0xB5C00DF9]]

[[inference]]
base = "passenger_freight_station"
requires = [[0x1300, 0x1305, 0xB5C00DF3], [0x1306, 0xB5C00DF4]]

[[inference]]
base = "hrw_station"
requires = [[0xB5C00DFA]]

[[inference]]
base = "monorail_station"
requires = [[0x1307, 0xB5C00DF7]]

[[inference]]
base = "elevated_rail_station"
requires = [[0x1303, 0xB5C00DF6, 0xB5C00DF9]]

[[inference]]
base = "passenger_train_station"
requires = [[0x1300, 0x1305, 0xB5C00DF3]]

[[inference]]
base = "freight_train_station"
requires = [[0x1306, 0xB5C00DF4]]

[[inference]]
base = "subway_station"
requires = [[0x1302, 0xB5C00DF5]]

[[inference]]
base = "bus_stop"
requires = [[0x1301, 0x1926, 0xB5C00DF2]]

[[inference]]
base = "toll_booth"
requires = [[0x130B]]

[[inference]]
base = "garage"
requires = [[0x130A, 0xB5C00DF1]]

