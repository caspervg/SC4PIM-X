# --- Logging ---
# Level accepts DEBUG, INFO, WARNING, ERROR, or CRITICAL
[Logging]
Enabled = true
Level = "INFO"
File = true
Console = true
Filename = "sc4pimx.log"
MaxBytes = 2000000
BackupCount = 3

# --- Paths ---
[Paths]
# Optional override for the user's SimCity 4 Plugins root. Empty uses the
# platform default Documents\SimCity 4\Plugins path.
UserPluginsRoot = ""

# --- Paired lot/building conversion output ---
[Conversion]
# Filename stems only. SC4PIM-X appends .SC4Lot for independent conversions
# and .dat for overrides. Available placeholders: {name}, {source},
# {category}, {gid}, {building_iid}, and {lot_iid}. IDs are uppercase,
# eight-digit hexadecimal.
ConvertedLotBuildingFilename = "{source}_Converted_{lot_iid}"
OverrideLotBuildingFilename = "{source}_Override"

# Relative to UserPluginsRoot. Use "." to write overrides directly there.
# Absolute paths and paths which escape the Plugins root are rejected.
OverrideOutputDirectory = "895-my-overrides"

# --- LotEditor workbench ---
[LotEditor]
BrowserWidth = 330
InspectorWidth = 280
AssetScope = "lot"
AssetFilter = "all"
AssetSearch = ""
AssetCompact = false
PreviewMonth = 1
PreviewDay = 1
PreviewMinutes = 720
ShowInactiveProps = false
# Colors for individually tintable overlays in the 2D editor (#RRGGBB).
WaterConstraintColor = "#0D4DF2"
WaterConstraintOpacity = 100
LandConstraintColor = "#F28C0D"
LandConstraintOpacity = 100
RoadEdgeColor = "#FFFFFF"
RoadEdgeOpacity = 100
BuildingMarkerColor = "#0000FF"
BuildingMarkerOpacity = 90
PropMarkerColor = "#FFFF00"
PropMarkerOpacity = 65
FloraMarkerColor = "#00FF00"
FloraMarkerOpacity = 65
SnapGridColor = "#800033"
SnapGridOpacity = 100
SelectionColor = "#FF0000"
SelectionOpacity = 100
MissingMarkerColor = "#FF0000"
MissingMarkerOpacity = 100
CardinalLabelColor = "#FFD933"
CardinalLabelOpacity = 100
CityContextStyle = "auto"
CityContextDensity = "auto"
CityContextHeight = "auto"
CityContextTraffic = "medium"
CityContextPedestrians = "medium"
CityContextDetail = "high"
CityContextSeason = "auto"
# BAT convention: compensate SC4's apparent vertical squash. Set to 1.0 for
# unscaled real-world/Maxis-like proportions.
CityContextVerticalScale = 1.33

# --- Graphics / rendering quality ---
# Tunes the OpenGL 3.3 preview pipeline. All values degrade gracefully: each is
# clamped to what the GPU actually supports, so over-asking is safe.
[Rendering]
# MSAA sample count for on-screen views and offscreen thumbnail/export buffers.
# 0 or 1 = off; 2, 4, 8 are typical. Clamped to the GPU maximum.
Samples = 4
# sRGB-correct (linear) rendering and blending.
SRGB = true
# Mipmap generation + trilinear filtering for model textures (kills shimmer).
Mipmaps = true
# Max anisotropic filtering for model textures (needs Mipmaps). 1.0 = off.
Anisotropy = 8.0

# --- Dependency catalog lookups ---
# Optional online enrichment for missing prop/texture dependencies. Set BaseUrl
# to a local catalog instance if preferred, for example "http://localhost:3000".
[DependencyCatalog]
Enabled = true
BaseUrl = "https://sc4proptexturecatalog-production.up.railway.app"
TimeoutSeconds = 15

# --- Plugin scan folders ---
# Populated by the Configure dialog. Each entry has a path and a recurse flag.
# Example:
# [[Folders]]
# Path    = 'C:\Users\you\Documents\SimCity 4\Plugins'
# Recurse = true

[Startup]
# Show the plugin-file configuration before loading the workspace.
ShowFileConfigurationAtStartup = true
