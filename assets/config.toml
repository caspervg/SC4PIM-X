# SC4PIM-X configuration.
#
# This single file replaces the old settings.ini, config.ini and config.xml.
# The scalar keys below are referenced *by name* in the category eval formulas
# in new_properties.xml, so their names are case-sensitive.

bAdvancedUser = true

# UI language: a code matching a bundled assets/lang/<code>.toml file ("en", ...).
Language = "en"

# --- School capacities (SCCS) ---
SCCSElementary = 500
SCCSHighSchool = 750
SCCSPrivate    = 1000
SCCSCollege    = 1000
SCCSLibrary    = 10000
SCCSMuseum     = 300
SCCSOpera      = 1200

# --- Health capacities (HCCS) ---
HCCSClinic   = 500
HCCSHospital = 750
HCCSOther    = 1000

# --- Menu item order ---
ItemOrderForPloppable     = 5
