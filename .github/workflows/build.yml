name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    continue-on-error: ${{ matrix.platform.experimental }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            archive: SC4PIMX-windows-x64.zip
            experimental: false
          - name: macOS
            os: macos-latest
            archive: SC4PIMX-macos-arm64.zip
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install 3.12

      - name: Sync build environment
        run: uv sync --python 3.12 --group build

      - name: Build executable
        run: uv run --python 3.12 pyinstaller --clean --noconfirm SC4PIMX.spec

      - name: Ad-hoc sign macOS bundle
        if: runner.os == 'macOS'
        run: codesign --deep --force --sign - dist/SC4PIMX.app

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/SC4PIMX -DestinationPath "${{ matrix.platform.archive }}"

      - name: Create macOS archive
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/SC4PIMX.app "${{ matrix.platform.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.archive }}
          path: ${{ matrix.platform.archive }}
          if-no-files-found: error
