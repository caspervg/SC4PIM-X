name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync --python 3.12 --group dev

      - name: Compile check
        run: uv run --python 3.12 python -m compileall -q src/sc4pimx

      - name: Import check
        run: uv run --python 3.12 python -c "import sc4pimx.SC4PIMApp; print('import OK')"

      - name: Test
        run: uv run --python 3.12 pytest
