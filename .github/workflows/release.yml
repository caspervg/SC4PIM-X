name: Release

on:
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Validate version tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]{4}\.[0-9]+$ ]]; then
            echo "Release tags must match vYYYY.N, for example v2026.1. Got: $TAG_NAME"
            exit 1
          fi

  package:
    name: Package ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    needs: validate-tag
    continue-on-error: ${{ matrix.platform.experimental }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            archive: SC4PIMX-windows-x64.zip
            sbom: SC4PIMX-windows-x64.cdx.json
            experimental: false
          - name: macOS
            os: macos-latest
            archive: SC4PIMX-macos-arm64.zip
            sbom: SC4PIMX-macos-arm64.cdx.json
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install 3.12

      - name: Set release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          uv run --python 3.12 python -c "import re, pathlib; p = pathlib.Path('src/sc4pimx/version.py'); p.write_text(re.sub(r'VERSION = \"[^\"]+\"', 'VERSION = \"$version\"', p.read_text(encoding='utf-8')), encoding='utf-8')"

      - name: Sync build environment
        run: uv sync --python 3.12 --group build

      - name: Generate SBOM
        shell: bash
        run: uvx --from cyclonedx-bom cyclonedx-py environment .venv --output-format JSON --output-file "${{ matrix.platform.sbom }}"

      - name: Build executable
        run: uv run --python 3.12 pyinstaller --clean --noconfirm SC4PIMX.spec

      - name: Bundle NOTICE, README and SBOM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item NOTICE, README.md, "${{ matrix.platform.sbom }}" dist/SC4PIMX/

      - name: Bundle NOTICE, README and SBOM (macOS)
        if: runner.os == 'macOS'
        run: cp NOTICE README.md "${{ matrix.platform.sbom }}" dist/SC4PIMX.app/Contents/Resources/

      - name: Ad-hoc sign macOS bundle
        if: runner.os == 'macOS'
        run: codesign --deep --force --sign - dist/SC4PIMX.app

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/SC4PIMX -DestinationPath "${{ matrix.platform.archive }}"

      - name: Create macOS archive
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/SC4PIMX.app "${{ matrix.platform.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.archive }}
          path: |
            ${{ matrix.platform.archive }}
            ${{ matrix.platform.sbom }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: SC4PIMX-*
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md << 'EOF'
          ## Windows

          Unzip the whole `SC4PIMX` folder and run `SC4PIMX.exe` from inside it.
          The executable needs the `_internal` folder beside it.

          ## macOS

          The build is Apple Silicon (arm64) and unsigned. After unzipping,
          remove the quarantine flag before launching:

          ```sh
          xattr -rd com.apple.quarantine SC4PIMX.app
          ```
          EOF
          gh release create "$TAG_NAME" release-artifacts/* \
            --repo "${{ github.repository }}" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md
